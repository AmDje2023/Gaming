<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mirror — Realistic Avatar</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ui-cyan: #00e5ff;
  --ui-orange: #ff6b00;
  --dark: #080a0f;
  --panel: rgba(8,12,20,0.85);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--dark);
  font-family: 'Barlow Condensed', sans-serif;
  overflow: hidden;
  width:100vw; height:100vh;
}

/* ── SPLIT ── */
#app { display:flex; width:100vw; height:100vh; }

/* ── LEFT CAM ── */
#cam-side {
  width:50%; height:100%;
  position:relative; overflow:hidden;
  background:#000;
}
#webcam {
  width:100%; height:100%;
  object-fit:cover;
  transform:scaleX(-1);
  display:block;
  filter: brightness(0.9) contrast(1.1);
}
#landmark-canvas {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; z-index:3;
}

/* ── DIVIDER ── */
#divider {
  width:3px; height:100%;
  background: linear-gradient(180deg, transparent 0%, var(--ui-orange) 30%, #fff 50%, var(--ui-orange) 70%, transparent 100%);
  flex-shrink:0; position:relative; z-index:20;
  box-shadow: 0 0 18px rgba(255,107,0,0.6);
}
#div-label {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background: var(--dark);
  border: 1px solid var(--ui-orange);
  border-radius:50%;
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  box-shadow: 0 0 14px rgba(255,107,0,0.5);
}

/* ── RIGHT AVATAR ── */
#avatar-side {
  width:50%; height:100%;
  position:relative; background: var(--dark);
}
#three-canvas { width:100%; height:100%; display:block; }

/* ── HUD CORNERS ── */
.hud-corner {
  position:absolute; width:22px; height:22px; pointer-events:none;
}
.hud-corner.tl { top:12px; left:12px; border-top:2px solid var(--ui-orange); border-left:2px solid var(--ui-orange); }
.hud-corner.tr { top:12px; right:12px; border-top:2px solid var(--ui-orange); border-right:2px solid var(--ui-orange); }
.hud-corner.bl { bottom:12px; left:12px; border-bottom:2px solid var(--ui-orange); border-left:2px solid var(--ui-orange); }
.hud-corner.br { bottom:12px; right:12px; border-bottom:2px solid var(--ui-orange); border-right:2px solid var(--ui-orange); }

/* ── TOP BAR ── */
#topbar {
  position:absolute; top:0; left:0; right:0;
  height:40px;
  display:flex; align-items:center;
  justify-content:space-between;
  padding:0 16px;
  background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  z-index:30; pointer-events:none;
}
#topbar-left { display:flex; align-items:center; gap:10px; }
.live-dot { width:7px; height:7px; border-radius:50%; background:#ff3333; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#topbar-title {
  font-family:'Barlow Condensed', sans-serif;
  font-size:14px; font-weight:700;
  letter-spacing:4px; color:#fff;
  text-transform:uppercase;
}
#topbar-status {
  font-size:11px; color:rgba(255,255,255,0.4);
  letter-spacing:2px;
}

/* ── FACE BADGE ── */
#face-badge {
  position:absolute; bottom:60px; left:50%;
  transform:translateX(-50%);
  font-size:10px; letter-spacing:3px;
  padding:4px 14px; border-radius:2px;
  background:rgba(255,107,0,0.12);
  border:1px solid rgba(255,107,0,0.5);
  color:var(--ui-orange);
  opacity:0; transition:opacity 0.4s;
  z-index:5; white-space:nowrap;
}
#face-badge.on { opacity:1; }

/* ── STATS ── */
#stats {
  position:absolute; bottom:16px; left:16px;
  background: var(--panel);
  border:1px solid rgba(255,107,0,0.25);
  border-radius:4px;
  padding:10px 14px;
  z-index:15;
  backdrop-filter:blur(8px);
  min-width:170px;
}
.st { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.st:last-child { margin-bottom:0; }
.st-lbl { font-size:9px; color:rgba(255,255,255,0.35); letter-spacing:2px; width:44px; }
.st-bar { flex:1; height:3px; background:rgba(255,255,255,0.08); border-radius:1px; overflow:hidden; }
.st-fill { height:100%; width:0%; border-radius:1px; transition:width 0.08s; }
.fill-o { background:var(--ui-orange); }
.fill-c { background:var(--ui-cyan); }
.fill-g { background:#55ff88; }
.st-val { font-size:10px; color:rgba(255,255,255,0.6); min-width:26px; text-align:right; font-family:'Rajdhani'; }

/* ── CONTROLS ── */
#controls {
  position:absolute; bottom:16px; right:16px;
  display:flex; flex-direction:column; gap:6px; z-index:15;
}
.cbtn {
  padding:7px 16px;
  font-family:'Barlow Condensed'; font-size:12px;
  font-weight:600; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer;
  border:1px solid rgba(255,107,0,0.35);
  background:rgba(0,0,0,0.6); color:rgba(255,255,255,0.7);
  border-radius:2px;
  transition:all 0.15s;
  backdrop-filter:blur(6px);
}
.cbtn:hover { background:rgba(255,107,0,0.18); border-color:var(--ui-orange); color:#fff; }
.cbtn.on { background:rgba(255,107,0,0.2); border-color:var(--ui-orange); color:var(--ui-orange); }

/* ── SKIN SELECTOR ── */
#skin-bar {
  position:absolute; top:50px; right:16px;
  display:flex; flex-direction:column; gap:6px; z-index:15;
}
.skin-dot {
  width:20px; height:20px; border-radius:50%;
  cursor:pointer; border:2px solid rgba(255,255,255,0.15);
  transition:all 0.2s;
}
.skin-dot.active { border-color:var(--ui-orange); box-shadow:0 0 8px rgba(255,107,0,0.6); transform:scale(1.2); }

/* ── LOADING ── */
#loading {
  position:fixed; inset:0;
  background:var(--dark); z-index:999;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:20px;
  transition:opacity 0.6s;
}
#loading.out { opacity:0; pointer-events:none; }
#ld-logo {
  font-family:'Barlow Condensed'; font-size:36px; font-weight:700;
  letter-spacing:8px; color:#fff;
  text-shadow: 0 0 40px rgba(255,107,0,0.6);
}
#ld-logo span { color:var(--ui-orange); }
#ld-bar-wrap { width:280px; height:2px; background:rgba(255,255,255,0.08); border-radius:1px; overflow:hidden; }
#ld-bar { height:100%; width:0%; background:var(--ui-orange); transition:width 0.25s; }
#ld-msg { font-size:11px; letter-spacing:3px; color:rgba(255,255,255,0.3); }

/* ── SCANLINES ── */
#scan {
  position:fixed; inset:0; pointer-events:none; z-index:60;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);
}

/* ── LABEL SIDES ── */
.side-tag {
  position:absolute; top:16px; left:50%;
  transform:translateX(-50%);
  font-size:9px; letter-spacing:4px; color:rgba(255,255,255,0.3);
  font-family:'Barlow Condensed'; font-weight:600;
  text-transform:uppercase; z-index:5;
}
</style>
</head>
<body>

<div id="loading">
  <div id="ld-logo">AI <span>MIRROR</span></div>
  <div id="ld-bar-wrap"><div id="ld-bar"></div></div>
  <div id="ld-msg">INITIALIZING...</div>
</div>
<div id="scan"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-left">
    <div class="live-dot"></div>
    <div id="topbar-title">MIRROR AVATAR</div>
  </div>
  <div id="topbar-status">CONNECTING FACE ENGINE...</div>
</div>

<div id="app">
  <!-- CAM -->
  <div id="cam-side">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="landmark-canvas"></canvas>
    <div class="side-tag">YOU</div>
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>
    <div id="face-badge">● FACE LOCKED</div>
  </div>

  <div id="divider"><div id="div-label">⇄</div></div>

  <!-- AVATAR -->
  <div id="avatar-side">
    <canvas id="three-canvas"></canvas>
    <div class="side-tag">AI AVATAR</div>
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>

    <!-- Skin selector -->
    <div id="skin-bar">
      <div class="skin-dot active" style="background:#c8956c" onclick="setSkin(0)" title="Skin clair"></div>
      <div class="skin-dot" style="background:#a0714f" onclick="setSkin(1)" title="Skin médium"></div>
      <div class="skin-dot" style="background:#6b4226" onclick="setSkin(2)" title="Skin foncé"></div>
      <div class="skin-dot" style="background:#3d2314" onclick="setSkin(3)" title="Skin très foncé"></div>
    </div>

    <!-- Stats -->
    <div id="stats">
      <div class="st"><span class="st-lbl">PITCH</span><div class="st-bar"><div class="st-fill fill-o" id="b-rx"></div></div><span class="st-val" id="v-rx">0°</span></div>
      <div class="st"><span class="st-lbl">YAW</span><div class="st-bar"><div class="st-fill fill-c" id="b-ry"></div></div><span class="st-val" id="v-ry">0°</span></div>
      <div class="st"><span class="st-lbl">ROLL</span><div class="st-bar"><div class="st-fill fill-o" id="b-rz"></div></div><span class="st-val" id="v-rz">0°</span></div>
      <div class="st"><span class="st-lbl">MOUTH</span><div class="st-bar"><div class="st-fill fill-g" id="b-mo"></div></div><span class="st-val" id="v-mo">0%</span></div>
      <div class="st"><span class="st-lbl">EYE L</span><div class="st-bar"><div class="st-fill fill-c" id="b-bl"></div></div><span class="st-val" id="v-bl">0%</span></div>
      <div class="st"><span class="st-lbl">EYE R</span><div class="st-bar"><div class="st-fill fill-c" id="b-br"></div></div><span class="st-val" id="v-br">0%</span></div>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button class="cbtn on" id="btn-lm" onclick="toggleLM()">Landmarks</button>
      <button class="cbtn" id="btn-wire" onclick="toggleWire()">Wireframe</button>
      <button class="cbtn" onclick="loadGLB()">📦 Load GLB</button>
    </div>
  </div>
</div>

<input type="file" id="glb-input" accept=".glb,.gltf" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
// ═══════════════════════════════════════════════
// LOADING
// ═══════════════════════════════════════════════
const ldBar = document.getElementById('ld-bar');
const ldMsg = document.getElementById('ld-msg');
function ld(p, m) { ldBar.style.width=p+'%'; if(m) ldMsg.textContent=m; }
function hideLd() {
  document.getElementById('loading').classList.add('out');
  setTimeout(()=>document.getElementById('loading')?.remove(), 700);
}
ld(10,'LOADING ENGINE...');

// ═══════════════════════════════════════════════
// THREE.JS
// ═══════════════════════════════════════════════
const canvas3 = document.getElementById('three-canvas');
const aside   = document.getElementById('avatar-side');
const renderer = new THREE.WebGLRenderer({ canvas:canvas3, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080a0f);
scene.fog = new THREE.Fog(0x080a0f, 6, 18);

const camera = new THREE.PerspectiveCamera(38, 1, 0.05, 50);
camera.position.set(0, 1.68, 2.8);
camera.lookAt(0, 1.45, 0);

function resize3() {
  const w = aside.clientWidth, h = aside.clientHeight;
  renderer.setSize(w,h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
resize3();
window.addEventListener('resize', resize3);

// ── LIGHTS ─────────────────────────────────
// Key (warm sunlight from top-left)
const keyL = new THREE.DirectionalLight(0xfff0e0, 2.8);
keyL.position.set(-2, 5, 3);
keyL.castShadow = true;
keyL.shadow.mapSize.set(2048,2048);
keyL.shadow.bias = -0.0003;
scene.add(keyL);

// Fill (cool bounce from right)
const fillL = new THREE.DirectionalLight(0xc8deff, 1.0);
fillL.position.set(3, 2, 1);
scene.add(fillL);

// Rim (back light)
const rimL = new THREE.DirectionalLight(0xffd0a0, 1.4);
rimL.position.set(0, 3, -4);
scene.add(rimL);

// Ambient
const ambL = new THREE.HemisphereLight(0x304060, 0x100a06, 0.8);
scene.add(ambL);

// Under fill
const underL = new THREE.PointLight(0x203050, 2, 4);
underL.position.set(0, -0.5, 1.5);
scene.add(underL);

ld(20,'BUILDING AVATAR...');

// ═══════════════════════════════════════════════
// SKIN TONES
// ═══════════════════════════════════════════════
const SKINS = [
  { skin:0xc8956c, lip:0xa06050, iris:0x3a2010, hair:0x1a0f06, brow:0x2a1508 }, // Light
  { skin:0xa0714f, lip:0x8a4a38, iris:0x2a1808, hair:0x150c05, brow:0x221008 }, // Medium
  { skin:0x6b4226, lip:0x6a3030, iris:0x1a1005, hair:0x100805, brow:0x1a0d05 }, // Dark
  { skin:0x3d2314, lip:0x4a2828, iris:0x100c04, hair:0x0a0604, brow:0x130b04 }, // Very Dark
];
let skinIdx = 0;

function S() { return SKINS[skinIdx]; }

// ── MATERIALS FACTORY ──────────────────────────
function mat(color, rough=0.7, metal=0, opts={}) {
  return new THREE.MeshStandardMaterial({ color, roughness:rough, metalness:metal, ...opts });
}

// Parts registry for face-driven animation
const P = {};
const avatarRoot = new THREE.Group();
scene.add(avatarRoot);

// ─────────────────────────────────────────────────────────────
// BUILD REALISTIC HUMAN AVATAR (GTA/PUBG style)
// ─────────────────────────────────────────────────────────────
function buildHuman() {
  while(avatarRoot.children.length) avatarRoot.remove(avatarRoot.children[0]);
  Object.keys(P).forEach(k => delete P[k]);

  const sk = S();

  // ── MATERIALS ──
  const skinM   = mat(sk.skin, 0.75, 0.0, { envMapIntensity:0.3 });
  const lipM    = mat(sk.lip,  0.65, 0.0);
  const irisM   = mat(sk.iris, 0.2,  0.0);
  const scleraM = mat(0xf5f0ea, 0.6, 0.0);
  const pupilM  = mat(0x050403, 0.8, 0.0);
  const hairM   = mat(sk.hair, 0.85, 0.05);
  const browM   = mat(sk.brow, 0.9, 0.0);

  // CLOTHING (GTA/PUBG tactical)
  const jacketM  = mat(0x2d3520, 0.88, 0.05); // dark olive drab jacket
  const vestM    = mat(0x1a1e14, 0.85, 0.08); // tactical vest black
  const pantsM   = mat(0x3a3228, 0.9,  0.02); // cargo pants dark khaki
  const beltM    = mat(0x1a1510, 0.7,  0.1);
  const bootM    = mat(0x1a1510, 0.75, 0.05); // black leather boots
  const bootSoleM= mat(0x080806, 0.95, 0.0);
  const glovM    = mat(0x181210, 0.8,  0.05);
  const vestDetailM = mat(0x252c18, 0.9, 0.1);
  const buckleM  = mat(0x888070, 0.4,  0.7);  // metal buckle

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // HEAD GROUP — everything rotates together
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const headGroup = new THREE.Group();
  headGroup.position.set(0, 1.62, 0);
  P.headGroup = headGroup;

  // ── SKULL / HEAD ──
  // Main cranium (ellipsoid)
  const skullG = new THREE.SphereGeometry(0.135, 48, 48);
  skullG.scale(1.45, 1.55, 1.35); // wider, taller, slightly shallow
  const skull = new THREE.Mesh(skullG, skinM);
  skull.castShadow = true;
  headGroup.add(skull);

  // Forehead bulge
  const foreG = new THREE.SphereGeometry(0.12, 24, 16);
  foreG.scale(1.3, 0.8, 0.9);
  const fore = new THREE.Mesh(foreG, skinM);
  fore.position.set(0, 0.105, 0.06);
  fore.castShadow = true;
  headGroup.add(fore);

  // ── JAW ──
  const jawG = new THREE.SphereGeometry(0.095, 32, 24);
  jawG.scale(1.35, 0.9, 1.15);
  P.jaw = new THREE.Mesh(jawG, skinM);
  P.jaw.position.set(0, -0.105, 0.02);
  P.jaw.castShadow = true;
  headGroup.add(P.jaw);

  // Chin
  const chinG = new THREE.SphereGeometry(0.055, 20, 16);
  chinG.scale(0.85, 0.7, 0.9);
  const chin = new THREE.Mesh(chinG, skinM);
  chin.position.set(0, -0.175, 0.06);
  headGroup.add(chin);

  // Cheekbones (L and R)
  [-1,1].forEach(s => {
    const ckG = new THREE.SphereGeometry(0.06, 16, 12);
    ckG.scale(1.2, 0.7, 0.9);
    const ck = new THREE.Mesh(ckG, skinM);
    ck.position.set(s*0.115, 0.02, 0.075);
    headGroup.add(ck);
  });

  // ── NOSE ──
  // Bridge
  const nBridgeG = new THREE.SphereGeometry(0.022, 12, 8);
  nBridgeG.scale(1, 2.2, 0.8);
  const nBridge = new THREE.Mesh(nBridgeG, skinM);
  nBridge.position.set(0, 0.035, 0.135);
  headGroup.add(nBridge);
  // Tip
  const nTipG = new THREE.SphereGeometry(0.028, 12, 8);
  nTipG.scale(1.1, 0.8, 1);
  P.noseTip = new THREE.Mesh(nTipG, skinM);
  P.noseTip.position.set(0, -0.015, 0.16);
  headGroup.add(P.noseTip);
  // Nostrils
  [-1,1].forEach(s => {
    const nG = new THREE.SphereGeometry(0.016, 10, 8);
    nG.scale(1.2, 0.7, 1.1);
    const n = new THREE.Mesh(nG, skinM);
    n.position.set(s*0.028, -0.022, 0.155);
    headGroup.add(n);
  });

  // ── LIPS / MOUTH ──
  // Upper lip
  const ulG = new THREE.SphereGeometry(0.052, 16, 8);
  ulG.scale(1, 0.45, 0.7);
  P.upperLip = new THREE.Mesh(ulG, lipM);
  P.upperLip.position.set(0, -0.055, 0.135);
  headGroup.add(P.upperLip);
  // Lower lip
  const llG = new THREE.SphereGeometry(0.055, 16, 8);
  llG.scale(1.05, 0.45, 0.8);
  P.lowerLip = new THREE.Mesh(llG, lipM);
  P.lowerLip.position.set(0, -0.078, 0.132);
  headGroup.add(P.lowerLip);
  // Mouth corners
  [-1,1].forEach(s => {
    const mcG = new THREE.SphereGeometry(0.014, 8, 6);
    const mc = new THREE.Mesh(mcG, lipM);
    mc.position.set(s*0.05, -0.067, 0.128);
    headGroup.add(mc);
  });

  // ── EARS ──
  [-1,1].forEach(s => {
    const eG = new THREE.SphereGeometry(0.032, 12, 10);
    eG.scale(0.55, 1.3, 0.5);
    const e = new THREE.Mesh(eG, skinM);
    e.position.set(s*0.185, 0.01, -0.01);
    headGroup.add(e);
    // Ear lobe
    const elG = new THREE.SphereGeometry(0.018, 8, 6);
    const el = new THREE.Mesh(elG, skinM);
    el.position.set(s*0.182, -0.048, -0.01);
    headGroup.add(el);
  });

  // ── EYES ──
  [-1,1].forEach((s, si) => {
    const label = si === 0 ? 'L' : 'R';
    const eyeX = s * 0.057;
    const eyeY = 0.038;
    const eyeZ = 0.118;

    // Eyeball (sclera)
    const eyeG = new THREE.SphereGeometry(0.028, 20, 16);
    const eyeball = new THREE.Mesh(eyeG, scleraM);
    eyeball.position.set(eyeX, eyeY, eyeZ);
    headGroup.add(eyeball);

    // Iris
    const irisG = new THREE.SphereGeometry(0.016, 16, 12);
    irisG.scale(1, 1, 0.5);
    const iris = new THREE.Mesh(irisG, irisM);
    iris.position.set(eyeX, eyeY, eyeZ + 0.022);
    headGroup.add(iris);

    // Pupil
    const pupilG = new THREE.SphereGeometry(0.009, 10, 8);
    pupilG.scale(1, 1, 0.4);
    const pupil = new THREE.Mesh(pupilG, pupilM);
    pupil.position.set(eyeX, eyeY, eyeZ + 0.026);
    headGroup.add(pupil);

    // Eye highlight
    const hlG = new THREE.SphereGeometry(0.004, 6, 6);

// FACE TRACKING STATE
// ═══════════════════════════════════════════════
const F = { rx:0,ry:0,rz:0, mo:0, blL:0, blR:0, brL:0, brR:0, det:false };
const Sm = { rx:0,ry:0,rz:0, mo:0, blL:0, blR:0, brL:0, brR:0 };
const LRP = 0.10;
const lerp = (a,b,t) => a+(b-a)*t;

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y, a.z-b.z); }
function pt(lms,i){ return lms[i]||{x:0,y:0,z:0}; }

// MediaPipe landmark indices
const LM = {
  NOSE:1, NOSE_BASE:168,
  CHIN:152, FOREHEAD:10,
  L_EAR:234, R_EAR:454,
  M_TOP:13, M_BOT:14, M_L:61, M_R:291,
  LE_T:159, LE_B:145, LE_L:33, LE_R:133,
  RE_T:386, RE_B:374, RE_L:362, RE_R:263,
  LB:70, RB:300,
};

function onFaceResults(res) {
  if(!res.multiFaceLandmarks?.length){ F.det=false; document.getElementById('face-badge').classList.remove('on'); return; }
  F.det=true;
  document.getElementById('face-badge').classList.add('on');
  const lms = res.multiFaceLandmarks[0];

  // YAW
  const earMidX = (pt(lms,LM.L_EAR).x + pt(lms,LM.R_EAR).x)/2;
  const earSpan = Math.abs(pt(lms,LM.L_EAR).x - pt(lms,LM.R_EAR).x);
  F.ry = -((pt(lms,LM.NOSE).x - earMidX)/(earSpan*0.5))*1.35;

  // PITCH
  const faceMidY = (pt(lms,LM.FOREHEAD).y + pt(lms,LM.CHIN).y)/2;
  const faceSpan = Math.abs(pt(lms,LM.FOREHEAD).y - pt(lms,LM.CHIN).y);
  F.rx = ((pt(lms,LM.NOSE_BASE).y - faceMidY)/(faceSpan*0.38))*1.05;

  // ROLL
  F.rz = (pt(lms,LM.L_EAR).y - pt(lms,LM.R_EAR).y)*3.2;

  // MOUTH
  const mv = dist(pt(lms,LM.M_TOP),pt(lms,LM.M_BOT));
  const mh = dist(pt(lms,LM.M_L), pt(lms,LM.M_R));
  F.mo = Math.min(Math.max((mv/mh - 0.04)*4.5, 0), 1);

  // EYE BLINK (EAR = eye aspect ratio)
  const EAR = (top,bot,ll,lr) => dist(pt(lms,top),pt(lms,bot)) / dist(pt(lms,ll),pt(lms,lr));
  const lEAR = EAR(LM.LE_T,LM.LE_B,LM.LE_L,LM.LE_R);
  const rEAR = EAR(LM.RE_T,LM.RE_B,LM.RE_L,LM.RE_R);
  const ET=0.20, EM=0.32;
  F.blL = Math.min(Math.max(1-(lEAR-ET)/(EM-ET),0),1);
  F.blR = Math.min(Math.max(1-(rEAR-ET)/(EM-ET),0),1);

  // BROWS
  const browDist = (browI, eyeI) => Math.abs(pt(lms,eyeI).y - pt(lms,browI).y);
  F.brL = Math.min(Math.max((0.055 - browDist(LM.LB,LM.LE_T))*22,-0.5),1);
  F.brR = Math.min(Math.max((0.055 - browDist(LM.RB,LM.RE_T))*22,-0.5),1);

  if(showLM) drawLandmarks(lms);
}

// LANDMARK DRAWING
// ═══════════════════════════════════════════════
const lmCanvas = document.getElementById('landmark-canvas');
const lmCtx = lmCanvas.getContext('2d');
let showLM = true;

function drawLandmarks(lms) {
  const W = lmCanvas.width, H = lmCanvas.height;
  lmCtx.clearRect(0,0,W,H);

  // Face mesh connections
  const conns = [
    [33,133],[133,159],[159,145],[145,33],
    [362,263],[263,386],[386,374],[374,362],
    [61,291],[291,14],[14,61],[13,14],
    [70,300],[70,159],[300,386],
    [1,152],[234,454],
    [10,152],[33,234],[263,454]
  ];
  lmCtx.strokeStyle='rgba(255,107,0,0.35)';
  lmCtx.lineWidth=1;
  conns.forEach(([a,b])=>{
    const pa=lms[a],pb=lms[b];
    lmCtx.beginPath();
    lmCtx.moveTo((1-pa.x)*W, pa.y*H);
    lmCtx.lineTo((1-pb.x)*W, pb.y*H);
    lmCtx.stroke();
  });

  // Key dots
  [1,33,133,362,263,61,291,13,14,152,10,234,454,70,300].forEach(i=>{
    const p=lms[i];
    lmCtx.beginPath();
    lmCtx.arc((1-p.x)*W, p.y*H, 2.5, 0, Math.PI*2);
    lmCtx.fillStyle='rgba(255,107,0,0.9)';
    lmCtx.fill();
  });
}

// APPLY TRACKING TO AVATAR
// ═══════════════════════════════════════════════
function applyTracking() {
  Sm.rx  = lerp(Sm.rx,  F.rx,  LRP);
  Sm.ry  = lerp(Sm.ry,  F.ry,  LRP);
  Sm.rz  = lerp(Sm.rz,  F.rz,  LRP);
  Sm.mo  = lerp(Sm.mo,  F.mo,  LRP*1.6);
  Sm.blL = lerp(Sm.blL, F.blL, LRP*2.2);
  Sm.blR = lerp(Sm.blR, F.blR, LRP*2.2);
  Sm.brL = lerp(Sm.brL, F.brL, LRP);
  Sm.brR = lerp(Sm.brR, F.brR, LRP);

  // ── HEAD GROUP rotation ──
  if(P.headGroup) {
    P.headGroup.rotation.x = Sm.rx * 0.72;
    P.headGroup.rotation.y = Sm.ry * 0.88;
    P.headGroup.rotation.z = Sm.rz * 0.5;
    P.headGroup.position.x = Sm.ry * 0.06;
    P.headGroup.position.y = 1.62 - Sm.rx * 0.06;
  }

  // ── TORSO subtle follow ──
  if(P.torso) {
    P.torso.rotation.y = Sm.ry * 0.14;
    P.torso.rotation.x = Sm.rx * 0.08;
  }

  // ── MOUTH OPEN — move jaw + lips ──
  if(P.jaw) {
    P.jaw.position.y = -0.105 - Sm.mo * 0.025;
    P.jaw.rotation.x = Sm.mo * 0.22;
  }
  if(P.lowerLip) {
    P.lowerLip.position.y = -0.078 - Sm.mo * 0.022;
    P.lowerLip.position.z = 0.132 - Sm.mo * 0.008;
  }
  if(P.upperLip) {
    P.upperLip.position.y = -0.055 + Sm.mo * 0.008;
  }

  // ── EYE BLINK — close upper eyelids ──
  if(P.eyeLidUpL) {
    P.eyeLidUpL.rotation.x = -0.15 + Sm.blL * 0.55;
    P.eyeLidUpL.position.z = -0.002 + Sm.blL * 0.006;
  }
  if(P.eyeLidUpR) {
    P.eyeLidUpR.rotation.x = -0.15 + Sm.blR * 0.55;
    P.eyeLidUpR.position.z = -0.002 + Sm.blR * 0.006;
  }

  // ── EYEBROW RAISE ──
  if(P.browL) P.browL.position.y = 0.068 + Sm.brL * 0.018;
  if(P.browR) P.browR.position.y = 0.068 + Sm.brR * 0.018;

  // Update HUD
  const rx=Math.round(Sm.rx*57), ry=Math.round(Sm.ry*57), rz=Math.round(Sm.rz*57);
  const mo=Math.round(Sm.mo*100), bl=Math.round(Sm.blL*100), br=Math.round(Sm.blR*100);
  document.getElementById('b-rx').style.width = Math.min(Math.abs(rx)*1.4+50,100)+'%';
  document.getElementById('b-ry').style.width = Math.min(Math.abs(ry)*1.4+50,100)+'%';
  document.getElementById('b-rz').style.width = Math.min(Math.abs(rz)*1.4+50,100)+'%';
  document.getElementById('b-mo').style.width = mo+'%';
  document.getElementById('b-bl').style.width = bl+'%';
  document.getElementById('b-br').style.width = br+'%';
  document.getElementById('v-rx').textContent = rx+'°';
  document.getElementById('v-ry').textContent = ry+'°';
  document.getElementById('v-rz').textContent = rz+'°';
  document.getElementById('v-mo').textContent = mo+'%';
  document.getElementById('v-bl').textContent = bl+'%';
  document.getElementById('v-br').textContent = br+'%';
}

// ═══════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════
let t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=0.016;
  applyTracking();

  // Breathing
  avatarRoot.position.y = Math.sin(t*0.9)*0.007;
  if(P.torso) P.torso.scale.x = 1 + Math.sin(t*0.9)*0.004;

  // Particles
  if(scene.particleSys){
    const pp = scene.particleSys.geometry.attributes.position;
    for(let i=0;i<120;i++){
      pp.array[i*3+1] -= 0.003;
      if(pp.array[i*3+1]<0) pp.array[i*3+1]=4;
    }
    pp.needsUpdate=true;
  }

  // Subtle key light movement
  keyL.position.x = -2 + Math.sin(t*0.2)*0.3;

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════
let wireM = false;

function toggleLM() {
  showLM = !showLM;
  document.getElementById('btn-lm').classList.toggle('on', showLM);
  if(!showLM) lmCtx.clearRect(0,0,lmCanvas.width,lmCanvas.height);
}

function toggleWire() {
  wireM = !wireM;
  document.getElementById('btn-wire').classList.toggle('on', wireM);
  avatarRoot.traverse(n => {
    if(n.isMesh && n.material){
      const ms = Array.isArray(n.material)?n.material:[n.material];
      ms.forEach(m=>m.wireframe=wireM);
    }
  });
}

function setSkin(idx) {
  skinIdx = idx;
  document.querySelectorAll('.skin-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  buildHuman();
}

// GLB Loader
function loadGLB() { document.getElementById('glb-input').click(); }
document.getElementById('glb-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  ld(50,'LOADING GLB...');
  const reader = new FileReader();
  reader.onload = ev => {
    const s = document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js';
    s.onload = () => {
      new THREE.GLTFLoader().parse(ev.target.result,'',(gltf)=>{
        while(avatarRoot.children.length) avatarRoot.remove(avatarRoot.children[0]);
        const mdl = gltf.scene;
        const box = new THREE.Box3().setFromObject(mdl);
        const sz = box.getSize(new THREE.Vector3());
        const ct = box.getCenter(new THREE.Vector3());
        const sc = 2.2/Math.max(sz.x,sz.y,sz.z);
        mdl.scale.setScalar(sc);
        mdl.position.sub(ct.multiplyScalar(sc));
        mdl.position.y += 0.8;
        mdl.traverse(n=>{ if(n.isMesh){ n.castShadow=true; n.receiveShadow=true; } });
        avatarRoot.add(mdl);
        ld(100,'GLB LOADED');
        setTimeout(hideLd,400);
      }, er=>{ console.error(er); buildHuman(); hideLd(); });
    };
    document.head.appendChild(s);
  };
  reader.readAsArrayBuffer(file);
});

// Mouse drag
let drag=false, lmx=0;
document.addEventListener('mousedown', e=>{ drag=true; lmx=e.clientX; });
document.addEventListener('mouseup', ()=>drag=false);
document.addEventListener('mousemove', e=>{
  if(!drag) return;
  avatarRoot.rotation.y += (e.clientX-lmx)*0.006;
  lmx=e.clientX;
});

// Touch
let ltx=0;
document.addEventListener('touchstart', e=>{ ltx=e.touches[0].clientX; });
document.addEventListener('touchmove', e=>{
  avatarRoot.rotation.y += (e.touches[0].clientX-ltx)*0.006;
  ltx=e.touches[0].clientX;
});

// ═══════════════════════════════════════════════
// INIT FACE MESH
// ═══════════════════════════════════════════════
async function initFace() {
  ld(60,'LOADING FACE ENGINE...');
  const fm = new FaceMesh({
    locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  fm.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.65, minTrackingConfidence:0.65 });
  fm.onResults(onFaceResults);

  ld(75,'STARTING CAMERA...');
  const video = document.getElementById('webcam');
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ width:640, height:480, facingMode:'user', frameRate:{ideal:30} },
    audio:false
  });
  video.srcObject = stream;
  await new Promise(r=>video.addEventListener('loadeddata',r));

  lmCanvas.width  = video.videoWidth  || 640;
  lmCanvas.height = video.videoHeight || 480;

  document.getElementById('topbar-status').textContent = 'TRACKING ACTIVE';
  ld(90,'CALIBRATING...');

  async function tick(){
    if(video.readyState>=2) await fm.send({image:video});
    requestAnimationFrame(tick);
  }

  ld(100,'READY');
  setTimeout(hideLd, 500);
  tick();
}

// ── START ──
animate();
initFace().catch(err=>{
  console.warn('Face engine error:', err);
  document.getElementById('topbar-status').textContent = 'DEMO MODE (NO CAM)';
  setInterval(()=>{
    const tt=Date.now()/1000;
    F.ry=Math.sin(tt*0.28)*0.4; F.rx=Math.cos(tt*0.35)*0.18;
    F.rz=Math.sin(tt*0.22)*0.1;
    F.mo=Math.max(0,Math.sin(tt*0.75)*0.55);
    F.blL=Math.sin(tt*4.2)>0.9?1:0;
    F.blR=Math.sin(tt*4.2+0.15)>0.9?1:0;
    F.det=true;
  },16);
  ld(100,'DEMO MODE');
  setTimeout(hideLd,600);
});
</script>
